# .github/workflows/rebuild-data.yml
#
# Phase 2 of Plumbline v1.0 — Decision 41 (no Cloudflare). This workflow
# refreshes public/data.json every 4h by running the data-snapshot script
# in the GitHub Actions runner. The result is committed back to main with
# a [skip ci] tag so the commit doesn't trigger another workflow run.
#
# Trigger surface:
#   - schedule: every 4h (00, 04, 08, 12, 16, 20 UTC) — spec §6.3
#   - workflow_dispatch: manual trigger from the Actions tab
#
# Page deploy is via GitHub Pages legacy mode (Phase 1.3) — no separate
# Actions job needed; Pages reads directly from the main branch and
# re-publishes whenever a new commit lands.
#
# Out of scope:
#   - Branch-based fallback (data-snapshots branch) — reserved for if the
#     main-branch Setup-Node issue recurs. Currently untriggered.

name: Rebuild Pulse data snapshot

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

concurrency:
  group: pulse-data-rebuild
  cancel-in-progress: false

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    env:
      FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '_source/package-lock.json'

      - name: Install dependencies
        working-directory: _source
        run: npm ci --no-audit --no-fund

      - name: Run data-snapshot
        working-directory: _source
        run: npm run data-snapshot

      - name: Validate data.json
        working-directory: _source
        run: node scripts/inspect-data-json.mjs | head -30

      - name: Check size budget
        working-directory: _source
        run: |
          SIZE_KB=$(stat -c%s public/data.json | awk '{print int($1/1024)}')
          echo "data.json size: ${SIZE_KB} KB"
          if [ "$SIZE_KB" -gt 500 ]; then
            echo "::error::data.json exceeds 500KB size budget (${SIZE_KB} KB)"
            exit 1
          fi

      - name: Commit and push
        run: |
          git config user.name "plumbline-data-bot"
          git config user.email "data-bot@plumbline.app"
          git add _source/public/data.json
          if git diff --cached --quiet; then
            echo "No changes to data.json — skipping commit"
            exit 0
          fi
          SIZE_KB=$(stat -c%s _source/public/data.json | awk '{print int($1/1024)}')
          git commit -m "data: refresh pulse snapshot (${SIZE_KB} KB) [skip ci]"
          git push