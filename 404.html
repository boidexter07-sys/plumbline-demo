<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Plumbline · Redirecting…</title>
    <link rel="icon" type="image/svg+xml" href="/plumbline-demo/favicon.svg" />
    <meta http-equiv="refresh" content="0; URL=/plumbline-demo/">
    <script>
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Copyright (c) 2016 Rafael Pedicini, licensed under the MIT License
      //
      // This script takes the current url and converts the path and query
      // parameters into a base url with a query string that the SPA can use.
      var pathSegmentsToKeep = 1; // keep the repo segment (/plumbline-demo/)
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>Redirecting…</body>
</html>
